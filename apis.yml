description: >-
  Envista Holdings is a global family of dental products companies and a Fortune
  1000 firm whose brands include Nobel Biocare, Ormco, KaVo, and Implant Direct.
  The company manufactures and supplies dental implants, orthodontic systems,
  imaging equipment, and consumables to clinicians worldwide. Envista does not
  publish a public, unified developer portal or external API; integrations are
  generally handled at the individual brand level for clinical software and
  imaging workflows.
